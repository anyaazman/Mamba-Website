<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Page Not Found - Mamba Management App</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="mamba-logo-transparent.png">
    <link rel="stylesheet" href="styles.css?v=8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400..800&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet">
</head>
<body class="page-loaded">
    <header class="header" role="banner">
        <nav class="nav" role="navigation" aria-label="Main navigation">
            <div class="logo-left">
                <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                    <div class="logo-icon">
                        <img src="mamba-logo-transparent.png" alt="Mamba Logo" class="mamba-logo header-logo-img">
                    </div>
                </a>
            </div>
        </nav>
    </header>

    <main class="error-page" role="main">
        <div class="error-code">404</div>
        <h1>PAGE NOT FOUND</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="index.html" class="cta-primary" style="text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
            <span>BACK TO HOME</span>
        </a>
    </main>

</html>
