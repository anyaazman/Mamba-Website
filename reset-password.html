<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Reset Password - Mamba Management App</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="mamba-logo-transparent.png">
    <link rel="stylesheet" href="styles.css?v=8">
    <link rel="stylesheet" href="portal.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400..800&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="loading-screen" role="status" aria-live="polite" aria-label="Loading">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="mamba-logo-transparent.png" alt="Mamba Logo" class="mamba-logo loading-logo-img">
            </div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <p class="loading-text">INITIALIZING NEURAL MATRIX...</p>
        </div>
    </div>

    <header class="header" role="banner">
        <nav class="nav" role="navigation" aria-label="Main navigation">
            <div class="logo-left">
                <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                    <div class="logo-icon">
                        <img src="mamba-logo-transparent.png" alt="Mamba Logo" class="mamba-logo header-logo-img">
                    </div>
                </a>
            </div>
        </nav>
    </header>

    <main id="main-content" role="main">
        <section style="min-height: calc(100vh - 98px); display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
            <div class="portal-container" style="width: 100%;">
                <div class="portal-card">
                    <h2>Reset Password</h2>
                    <p>Enter your email and recovery phrase to set a new password.</p>

                    <form class="auth-form reset-form" novalidate>
                        <div class="form-error"></div>
                        <div class="form-group">
                            <label for="reset-email">Email</label>
                            <input type="email" id="reset-email" name="email" placeholder="Enter your email" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="reset-recovery">Recovery Phrase</label>
                            <input type="text" id="reset-recovery" name="recovery_phrase" placeholder="Enter your recovery phrase" required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="reset-password">New Password</label>
                            <input type="password" id="reset-password" name="new_password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="reset-confirm">Confirm New Password</label>
                            <input type="password" id="reset-confirm" name="confirm_password" placeholder="Re-enter new password" required minlength="8" autocomplete="new-password">
                        </div>
                        <button type="submit" class="submit-btn">Reset Password</button>
                    </form>

                    <div class="auth-footer" style="margin-top: 1.5rem;">
                        <a href="login.html">Back to Sign In</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="tracking.js?v=1"></script>
    <script src="demo.js?v=2"></script>
    <script src="reset-password.js?v=3"></script>
</body>
</html>
