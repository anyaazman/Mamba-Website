<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#39ff14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Symbol -->
  <g transform="translate(400,200)" filter="url(#glow)">
    <!-- Main M Pattern -->
    <path d="M-80,-40 L-80,40 L-40,0 L0,40 L40,0 L80,40 L80,-40 L40,-40 L0,0 L-40,-40 Z"
          fill="url(#logoGradient)" stroke="#00ffff" stroke-width="2"/>

    <!-- Inner Details -->
    <path d="M-60,-20 L-60,20 L-20,0 L20,20 L60,0 L60,-20"
          fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.8"/>

    <!-- Center Diamond -->
    <circle cx="0" cy="0" r="8" fill="#00ffff" opacity="0.9"/>
  </g>

  <!-- Text -->
  <g transform="translate(400,320)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold"
          fill="url(#logoGradient)" filter="url(#glow)">MAMBA</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20"
          fill="#94A3B8" letter-spacing="4px">INDICATOR</text>
  </g>
</svg>